<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My App</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f0f0f0;
      font-family: sans-serif;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 30px;
    }

    button {
      font-size: 20px;
      padding: 16px 40px;
      background: #007AFF;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }

    button:active {
      background: #0051a8;
    }

    #message {
      margin-top: 24px;
      font-size: 18px;
      color: #333;
    }
  </style>
</head>
<body>

  <h1>My App</h1>
  <button onclick="document.getElementById('message').textContent = 'Button pressed!'">
    Press Me
  </button>
  <p id="message"></p>

</body>
</html>
